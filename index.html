<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ACE Onboarding Schedule — Square Export</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<div class="toolbar">
  <h1>ACE Onboarding Schedule — Square Export</h1>
  <p class="sub">Grade 7 &amp; Grade 9 · SY 2026–2027 · Export 1:1 images for printing or posting</p>

  <div class="controls">
    <div class="seg" id="weekSeg"></div>
    <div class="seg" id="modeSeg">
      <button data-mode="week" class="active">Week grid</button>
      <button data-mode="day">Per day</button>
    </div>
    <div class="seg" id="daySeg"></div>
    <div class="seg" id="gradeSeg">
      <button data-grade="all" class="active">Both grades</button>
      <button data-grade="G7">Grade 7</button>
      <button data-grade="G9">Grade 9</button>
    </div>
    <div class="spacer"></div>
    <button class="btn-download btn-secondary" id="downloadAllBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span id="downloadAllLabel">Download All</span>
    </button>
    <button class="btn-download" id="downloadBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download PNG (1080×1080)
    </button>
  </div>
</div>

<div class="stage-wrap">
  <div class="stage">
    <div class="scaler">
      <div class="capture" id="capture"></div>
    </div>
  </div>
</div>

<!-- Off-screen, full-resolution, untransformed copy used only for PNG export.
     (html2canvas mis-measures elements that sit under a CSS transform: scale,
     so export renders from this untransformed clone instead of the preview.) -->
<div style="position:fixed; top:0; left:-99999px;">
  <div class="capture" id="exportCapture"></div>
</div>

<script src="js/data.js"></script>
<script src="js/render.js"></script>
<script src="js/export.js"></script>
<script src="js/app.js"></script>
</body>
</html>
