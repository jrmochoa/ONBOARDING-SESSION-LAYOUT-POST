<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ACE Onboarding Session — Status Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/session-status-report.css">
<script>(function(){var s=localStorage.getItem('ace-schedule-theme');var f;try{f=window.self!==window.top;}catch(e){f=true;}document.documentElement.setAttribute('data-theme',(s==='light'||s==='dark')?s:(f?'light':'dark'));if(f)document.documentElement.setAttribute('data-embedded','true');})();</script>
</head>
<body>

<div class="wrap">
  <div class="pagehead">
    <div class="pagehead-top">
      <h1>Session Status Report</h1>
      <button id="themeToggle" class="theme-toggle"></button>
    </div>
    <p class="sub">Every section's 5 onboarding sessions, marked done or upcoming — computed live from <code>js/data.js</code>, nothing here is hand-typed.</p>
  </div>

  <div id="reportTable"></div>

  <p class="legend"><span class="mark-cell">&#10003;</span> = session held (or the shared online kickoff, Session 1, which already took place). Blank = upcoming.</p>
</div>

<script src="js/theme.js"></script>
<script src="js/data.js"></script>
<script src="js/session-status-report.js"></script>
</body>
</html>
