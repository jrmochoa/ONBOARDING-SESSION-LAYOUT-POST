<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ACE Onboarding Session — Status Report</title>
<style>
  body{
    margin:0;
    padding:32px;
    font-family:Arial,Helvetica,sans-serif;
    background:#fff;
    color:#000;
  }
  .wrap{ max-width:720px; margin:0 auto; }
  h1{ font-size:18px; margin:0 0 4px; }
  .sub{ font-size:12px; color:#555; margin:0 0 18px; }
  table{
    border-collapse:collapse;
    width:100%;
  }
  th, td{
    border:1px solid #000;
    padding:6px 10px;
    text-align:center;
  }
  thead th{
    font-weight:700;
  }
  th.corner{ border-top:none; border-left:none; }
  .row-label{
    text-align:left;
    color:#1237B3;
    font-weight:600;
    white-space:nowrap;
  }
  .mark-cell{
    font-weight:700;
    color:#16A34A;
  }
  .legend{ margin-top:14px; font-size:11px; color:#555; }
  @media print{
    body{ padding:0; }
    .legend{ display:none; }
  }
</style>
</head>
<body>

<div class="wrap">
  <h1>ACE Onboarding Session — Status Report</h1>
  <p class="sub">Computed live from <code>js/data.js</code> — nothing here is hand-typed.</p>
  <div id="reportTable"></div>
  <p class="legend">✓ = session held (or the shared online kickoff, Session 1, which already took place). Blank = upcoming.</p>
</div>

<script src="js/data.js"></script>
<script src="js/session-status-report.js"></script>
</body>
</html>
